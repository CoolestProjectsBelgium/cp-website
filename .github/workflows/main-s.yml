on:
  push:
    branches:
      - main
name: 🚀 Deploy website on push using SCP
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: 📂 Sync files via SCP
      uses: appleboy/scp-action@8a92fcdb1eb4ffbf538b2fa286739760aac8a95b # v0.1.4
      with:
        host: ${{ secrets.ftp_server }}
        username: ${{ secrets.ftp_user }}
        key: ${{ secrets.ssh_private_key }}
        port: 22
        source: "."
        target: "/var/www/production/current/cpbe"
        strip_components: 1  # Optional: Remove the first level of the directory structure if needed
